# blog-backend 백엔드 CD - master에 push/merge 시 EC2에서 pull → 빌드 → 재시작
name: Deploy Blog Backend to EC2

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on EC2 (pull, build, restart)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/blogg/blog-backend
            git pull origin master
            ./mvnw -B package -DskipTests
            pm2 restart blog-backend
          script_stop: true
          command_timeout: 15m
