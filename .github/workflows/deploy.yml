# blog-backend 백엔드 CD - master에 push/merge 시 EC2에 자동 배포
name: Deploy Blog Backend to EC2

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn -B package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/blog-backend-0.0.1-SNAPSHOT.jar"
          target: "/home/ec2-user/blogg/blog-backend/"

      - name: Restart backend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/blogg/blog-backend
            sudo systemctl restart blog-backend || true
            # systemctl이 없으면 수동 재시작 예시:
            # pkill -f blog-backend || true
            # nohup java -jar blog-backend-*.jar --spring.profiles.active=prod > app.log 2>&1 &
          script_stop: true
